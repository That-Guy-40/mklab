# Unified Rocky Linux zero-touch PXE lab — one TOML feeds Phase 4 and Phase 2.
#
# Each phase tool reads only the blocks it owns and silently ignores the rest:
#   phase4-podman/lab-podman.sh   reads [[service]] with engine="podman"
#   phase2-qemu-vm/lab-vm.sh      reads [[vm]]
#
# This is the Rocky Linux twin of examples/almalinux-pxe-lab.toml.  The only
# distro-specific differences are the installer fetch step (Rocky checksums
# live in .treeinfo, not a per-dir CHECKSUM) and the upstream repo URLs.
#
# ─── Workflow — run these in order against this file ─────────────────────────
#
#   # 1. Fetch + verify the Rocky installer kernel and initrd into ~/netboot/:
#   examples/rocky-pxe-lab/fetch-rocky-installer.sh --release 9 --arch x86_64
#
#   # 2. Render a per-host kickstart for the VM's pinned MAC (generic copier):
#   netboot/gen-almalinux-ks.sh --mac 52:54:00:cc:09:09 \
#       --template examples/rocky-pxe-lab/rocky9-zerotouch.ks
#       # -> ~/netboot/ks/52-54-00-cc-09-09.ks
#
#   # 3. Build iPXE with the per-host {MAC} kickstart URL + Rocky repo embedded:
#   netboot/build-ipxe.sh --server http://10.0.2.2:8181 \
#       --kernel-path /vmlinuz --initrd-path /initrd.img \
#       --append 'inst.stage2=http://10.0.2.2:8181/ inst.repo=https://download.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/ inst.ks=http://10.0.2.2:8181/ks/{MAC}.ks inst.text console=ttyS0 ip=dhcp'
#       # {MAC} is a literal token replaced at build time; iPXE expands it to
#       # the NIC's MAC at runtime (e.g. 52-54-00-cc-09-09).
#
#   # 4. Bring up the rootless nginx artifact server (Phase 4):
#   phase4-podman/lab-podman.sh up --config examples/rocky-pxe-lab/rocky-pxe-lab.toml
#
#   # 5. Create and start the installer VM (Phase 2) — unattended:
#   phase2-qemu-vm/lab-vm.sh create --config examples/rocky-pxe-lab/rocky-pxe-lab.toml
#   phase2-qemu-vm/lab-vm.sh start  rocky-pxe-install   # walk away; comes back installed
#   phase2-qemu-vm/lab-vm.sh ssh    rocky-pxe-install   # login: lab / lab
#
# Tear down:
#   phase4-podman/lab-podman.sh down    --lab rocky-pxe
#   phase2-qemu-vm/lab-vm.sh    destroy rocky-pxe-install --force
#
# Real hardware (faithful to the CIQ "Booting Rocky Linux via PXE" article):
#   use a dnsmasq ProxyDHCP + TFTP setup instead of QEMU's built-in slirp —
#   see examples/rocky-pxe-lab/README.md §"Path B".
#
# Update /home/sqs to your $HOME if different (no shell expansion in TOML).

[lab]
name        = "rocky-pxe"
description = "Zero-touch Rocky Linux 9 PXE install: rootless nginx serves vmlinuz/initrd/kickstart (Phase 4); QEMU target VM installs from iPXE -> Anaconda and reboots into Rocky (Phase 2)."
tags        = ["rocky", "rocky-linux", "pxe", "netboot", "zero-touch"]

# ─── Phase 4: rootless nginx serving netboot artifacts ─────────────────────
# Serves vmlinuz, initrd.img, and ks/*.ks from ~/netboot/ on host port 8181.
# lab-podman.sh auto-appends :Z to the volume when SELinux is enforcing.
[[service]]
name    = "http"
engine  = "podman"
image   = "docker.io/library/nginx:alpine"
ports   = ["8181:80"]
volumes = ["/home/sqs/netboot:/usr/share/nginx/html:ro"]

# ─── Phase 2: QEMU installer VM (pxe-install: NIC PXE boots ipxe.pxe) ───────
# SeaBIOS tries the blank target disk (bootindex=0) → fails when empty → falls to
# the NIC's stock PXE ROM → TFTP-chainloads ipxe.pxe → iPXE fetches Anaconda's
# vmlinuz/initrd.img over HTTP + the per-MAC kickstart → installs to /dev/vda →
# reboots into Rocky (the disk, bootindex=0, then boots; the NIC ROM is never
# reached again → loop terminates).
#   UEFI variant: drop `firmware` and set pxe_bootfile = "ipxe.efi".
# (The older two-disk iPXE-ROM-on-a-disk trick does NOT boot in QEMU: SeaBIOS
# tries only the first hard disk, and disk-image x86_64 defaults to OVMF, which
# can't boot a BIOS-MBR disk.)  cloud_init=false: Anaconda provisions from the ks.
[[vm]]
name           = "rocky-pxe-install"
backend        = "pxe-install"          # NIC PXE-boots ipxe.pxe; no iPXE ROM disk
firmware       = "bios"                  # SeaBIOS + NIC option-ROM path (UEFI: drop this + use ipxe.efi)
install_target = "20G"                   # blank disk, bootindex=0: install dest + post-install boot disk
mac            = "52:54:00:cc:09:09"     # pinned so the per-MAC kickstart matches
arch           = "x86_64"
memory         = "4096M"               # 4G: Anaconda + the HTTP stage2 (install.img ~1.2 GB) loads into the initramfs tmpfs
cpus           = 2
cloud_init     = false                   # Anaconda provisions directly; no datasource
pxe_dir        = "/home/sqs/netboot"     # QEMU slirp TFTP root (serves ipxe.pxe)
pxe_bootfile   = "ipxe.pxe"              # BIOS iPXE NBP (UEFI: ipxe.efi)
