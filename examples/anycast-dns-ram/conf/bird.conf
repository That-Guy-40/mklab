# bird2 acting as a passive BGP collector / looking-glass. It only RECEIVES the
# anycast route the gated node advertises and shows it — it installs nothing.
router id 10.89.7.20;
log stderr all;

protocol device { }

# Do NOT push learned routes into the container's kernel table.
protocol kernel {
    ipv4 { export none; };
}

protocol bgp gated {
    local 10.89.7.20 as 65020;
    neighbor 10.89.7.10 as 65010;
    passive on;                 # wait for the node to connect
    ipv4 {
        import all;
        export none;
    };
}
