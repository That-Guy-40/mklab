# Foreign-arch aarch64 Debian bookworm VM (boots under TCG on x86_64 hosts).
# Slow but works without any aarch64 hardware. ~3–5 min to first SSH.
# Build: lab-vm.sh create --config examples/vm-examples/vm-debian-aarch64.toml

[[vm]]
name     = "deb-arm64"
backend  = "disk-image"
distro   = "debian"
suite    = "bookworm"
arch     = "aarch64"
memory   = "1G"
cpus     = 1
