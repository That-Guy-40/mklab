# Minimal nginx.conf for the FreeBSD "www" box — serves the AlmaLinux tree over
# HTTP with directory listing ON (Anaconda/dnf walk the repo, so autoindex must be
# enabled). Mirrors vermaden's setup; docroot holds almalinux/<major>/{BaseOS,AppStream}/...
#
# Install path on FreeBSD: /usr/local/etc/nginx/nginx.conf  (setup-freebsd.sh does this)

worker_processes  1;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen       80;
        server_name  localhost;

        location / {
            root      /usr/local/www/nginx;
            autoindex on;            # Anaconda needs to browse the repo tree
        }
    }
}
