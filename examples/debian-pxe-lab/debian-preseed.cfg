# Debian 13 "trixie" zero-touch install — Debian-installer (d-i) preseed.
# Throwaway-lab posture, served at http://<server>/debian/debian-preseed.cfg.
#
# This is a lab-tuned distillation of Debian's OFFICIAL example preseed
# (vendored byte-exact under upstream-preseed/example-preseed.txt, from
# https://www.debian.org/releases/trixie/example-preseed.txt).  The official
# file is one big, heavily-commented reference that ships every option as a
# COMMENTED alternative; this file un-comments the lab's choices and adds the
# handful of values a fully unattended install needs (accounts, the vda disk
# pin, a serial console).  Kali's preseed (examples/kali-pxe-lab/kali-preseed.cfg)
# is the same d-i machinery pointed at the Kali mirror — Debian is the upstream.
#
# It is fetched by d-i because the iPXE kernel cmdline carries:
#   auto=true priority=critical preseed/url=http://<server>/debian/debian-preseed.cfg
# `auto=true priority=critical` suppresses every interactive prompt that this
# file answers, giving a fully unattended install.
#
# ─── Security posture ────────────────────────────────────────────────────────
#   WARNING: plaintext lab credentials (root: lab, user debian: debian).
#   NEVER expose this VM or the server that serves this preseed to an untrusted
#   network — anyone who can fetch it learns the passwords.
#   For real use: switch the clear-text password lines to the hashed form
#     d-i passwd/root-password-crypted password [crypt(3) SHA-512 hash]
#     d-i passwd/user-password-crypted password [crypt(3) SHA-512 hash]
#   (generate with: mkpasswd -m sha-512  ── from the 'whois' package),
#   restrict nginx to loopback or a private VLAN, and rotate after first boot.
#
# ─── Disk pin rationale (the one genuinely install-breaking issue) ───────────
# The QEMU target VM boots via `pxe-install`: the NIC's iPXE option ROM fetches
# the installer over the network (no second disk).  The VM's only disk is the
# single virtio target, /dev/vda.  partman + grub are pinned to /dev/vda below
# so the install is fully unattended (no disk prompt) and GRUB lands on the disk
# SeaBIOS boots next — the d-i equivalent of the Rocky/Alma kickstart's
# `ignoredisk --only-use=vda`.  See MANUAL_TESTING.md for the enumeration proof
# and a size-based `partman/early_command` hardening if you ever add disks.
# ─────────────────────────────────────────────────────────────────────────────

### Localization
d-i debian-installer/locale          string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
# The installer NIC comes up via DHCP (QEMU slirp serves it).  Pick the first
# wired link automatically and don't prompt.  Force the hostname/domain so the
# install never stalls on the "unassigned-hostname" default the example ships.
d-i netcfg/choose_interface          select auto
d-i netcfg/get_hostname              string debian-pxe
d-i netcfg/get_domain                string lab
d-i netcfg/hostname                  string debian-pxe
# Don't stall waiting for a slow link-detect, and don't prompt on no-DHCP.
d-i netcfg/dhcp_timeout              string 60
d-i netcfg/link_wait_timeout         string 30

### Mirror — trixie over the Debian CDN front (deb.debian.org).
# The Debian archive signing key ships inside the d-i initrd, so apt trusts the
# mirror out of the box (no manual keyring step, unlike a host debootstrap).
d-i mirror/country                   string manual
d-i mirror/http/hostname             string deb.debian.org
d-i mirror/http/directory            string /debian
d-i mirror/http/proxy                string
d-i mirror/suite                     string trixie

### Clock & time zone
d-i clock-setup/utc                  boolean true
d-i time/zone                        string Etc/UTC
d-i clock-setup/ntp                  boolean true

### Accounts — throwaway lab credentials (consistent with the rest of mklab).
# Root login enabled with password 'lab'; a sudo-capable user 'debian' / 'debian'.
d-i passwd/root-login                boolean true
d-i passwd/root-password             password lab
d-i passwd/root-password-again       password lab
d-i passwd/user-fullname             string Debian Lab User
d-i passwd/username                  string debian
d-i passwd/user-password             password debian
d-i passwd/user-password-again       password debian
# Put 'debian' in sudo (and the usual desktop groups) so `sudo` works immediately.
d-i passwd/user-default-groups       string audio cdrom dip plugdev netdev sudo

### Partitioning — confine EVERYTHING to vda (the only disk on this VM).
# method=regular + recipe=atomic → the whole disk in one root partition (+swap):
# the simplest layout, fastest to reason about.  The debian-preseed-gallery lab
# is the "pick lvm/crypto/home/multi instead" companion to this single default.
d-i partman-auto/disk                string /dev/vda
d-i partman-auto/method              string regular
d-i partman-auto/choose_recipe       select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition         select finish
d-i partman/confirm                  boolean true
d-i partman/confirm_nooverwrite      boolean true
# Silence any leftover LVM/RAID prompt even though this recipe uses neither.
d-i partman-lvm/device_remove_lvm    boolean true
d-i partman-md/device_remove_md      boolean true
d-i partman-md/confirm               boolean true
d-i partman-lvm/confirm              boolean true
d-i partman-lvm/confirm_nooverwrite  boolean true

### Base system
d-i base-installer/install-recommends boolean true
# Pin the installed system to a serial console so `lab-vm.sh console` works
# after the boot hands off to the installed kernel.
d-i debian-installer/add-kernel-opts string console=ttyS0,115200n8

### Apt setup — plain main; enable security + updates services.
d-i apt-setup/cdrom/set-first        boolean false
d-i apt-setup/services-select        multiselect security, updates
popularity-contest popularity-contest/participate boolean false

### Package selection
# LEAN by default so the lab finishes fast (~standard system + SSH).  Add a
# desktop or more tooling by editing pkgsel/include, or the tasksel line:
#   tasksel tasksel/first multiselect standard, ssh-server, gnome-desktop
tasksel tasksel/first                multiselect standard, ssh-server
d-i pkgsel/include                   string openssh-server sudo curl
d-i pkgsel/upgrade                   select none

### Bootloader — GRUB to vda only.
d-i grub-installer/only_debian       boolean true
d-i grub-installer/with_other_os     boolean false
d-i grub-installer/bootdev           string /dev/vda

### Finish — reboot automatically into the freshly-installed system.
d-i finish-install/reboot_in_progress note
