# QEMU direct boot for the busybox netboot track (no iPXE, no cloud-init).
#
# This VM boots the busybox initrd built by chroot-netboot-busybox.toml.
# QEMU's -kernel/-initrd flags are equivalent to what iPXE does: both load the
# kernel and initrd into RAM and jump to the kernel entry point.  The only
# difference is where the files come from — local path here, HTTP there.
# Skipping iPXE removes one moving part and shortens the debug loop.
#
# Compared with vm-netboot-full.toml:
#   memory: 512M instead of 4G — busybox has no locales-all or systemd, so the
#     initrd decompresses to only a few MB in RAM.
#   cloud_init: absent — the busybox initrd has no cloud-init agent; a seed ISO
#     would be silently ignored, so there is no point generating one.
#
# Workflow:
# 1. Build the busybox chroot (needs root, ~2-3 min):
#    sudo phase1-chroot/lab-chroot.sh create --config examples/chroot-netboot-busybox.toml
#
# 2. Export kernel + initrd (needs root):
#    sudo phase1-chroot/lab-chroot.sh export-initrd netboot-busybox \
#        --kernel ~/netboot/kernel --output ~/netboot/initrd.gz
#
# 3. Create the VM record and start it (no sudo needed):
#    phase2-qemu-vm/lab-vm.sh create --config examples/vm-netboot-direct.toml
#    phase2-qemu-vm/lab-vm.sh start  netboot-direct
#
# Expect on the serial console: a busybox sh prompt (no login).
# Press Ctrl-] to detach from the console.
#
# iPXE virtual-disk alternative (manual step):
#   Build iPXE with an embedded script:
#     make bin-x86_64-efi/ipxe.efi EMBED=script.ipxe
#   Then pass it to QEMU as firmware:
#     qemu-system-x86_64 -bios ipxe.efi ...
#   (or -drive if=pflash,file=ipxe.efi for UEFI flash)
#   iPXE will DHCP, fetch boot.ipxe from the Phase 4 nginx server, download
#   kernel + initrd over HTTP, and hand them to the kernel — same boot path,
#   different delivery mechanism.  See examples/vm-netboot-ipxe.toml.
#
# See examples/chroot-netboot-busybox.toml for the package list.
# See examples/vm-netboot-full.toml    for the full Debian (systemd) equivalent.

[[vm]]
name    = "netboot-direct"
backend = "kernel+initrd"
arch    = "x86_64"
memory  = "512M"
cpus    = 1
# Update /home/sqs to your $HOME if different (no shell expansion in TOML).
kernel  = "/home/sqs/netboot/kernel"
initrd  = "/home/sqs/netboot/initrd.gz"
append  = "console=ttyS0 root=/dev/ram0 rw"
network = true
