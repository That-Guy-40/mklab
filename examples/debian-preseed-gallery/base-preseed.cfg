# Debian 13 "trixie" preseed — GALLERY BASE (common body for every variant).
#
# fetch-preseeds.sh stamps a per-variant PARTITIONING block into the marked
# region below (and, for the `minimal` variant, swaps the tasksel line) to emit
# each ready-to-boot preseed under ~/netboot/debian-preseed/<variant>.cfg.
# Everything OUTSIDE the markers is identical across variants.
#
# This body is a lab-tuned distillation of Debian's OFFICIAL example preseed
# (vendored byte-exact under upstream-preseed/example-preseed.txt).  The variant
# PARTITIONING blocks are the example's own documented alternatives — method =
# regular | lvm | crypto, recipe = atomic | home | multi — nothing invented.
#
#   WARNING: plaintext lab credentials (root: lab, user debian: debian; the
#   crypto variant's disk passphrase is 'labcrypto').  NEVER serve this on an
#   untrusted network.  For real use switch to *-password-crypted keys
#   (mkpasswd -m sha-512) and a strong disk passphrase, and restrict nginx.

### Localization
d-i debian-installer/locale          string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
d-i netcfg/choose_interface          select auto
d-i netcfg/get_hostname              string debian-preseed
d-i netcfg/get_domain                string lab
d-i netcfg/hostname                  string debian-preseed
d-i netcfg/dhcp_timeout              string 60
d-i netcfg/link_wait_timeout         string 30

### Mirror — trixie over the Debian CDN front (deb.debian.org).
d-i mirror/country                   string manual
d-i mirror/http/hostname             string deb.debian.org
d-i mirror/http/directory            string /debian
d-i mirror/http/proxy                string
d-i mirror/suite                     string trixie

### Clock & time zone
d-i clock-setup/utc                  boolean true
d-i time/zone                        string Etc/UTC
d-i clock-setup/ntp                  boolean true

### Accounts — throwaway lab credentials.
d-i passwd/root-login                boolean true
d-i passwd/root-password             password lab
d-i passwd/root-password-again       password lab
d-i passwd/user-fullname             string Debian Lab User
d-i passwd/username                  string debian
d-i passwd/user-password             password debian
d-i passwd/user-password-again       password debian
d-i passwd/user-default-groups       string audio cdrom dip plugdev netdev sudo

# >>> BEGIN partman (per-variant block; fetch-preseeds.sh replaces this region) >>>
# Default = regular + atomic (whole disk, one root partition).  This placeholder
# is overwritten for every generated variant; edit fetch-preseeds.sh, not here.
d-i partman-auto/disk                string /dev/vda
d-i partman-auto/method              string regular
d-i partman-auto/choose_recipe       select atomic
d-i partman-lvm/device_remove_lvm    boolean true
d-i partman-md/device_remove_md      boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition         select finish
d-i partman/confirm                  boolean true
d-i partman/confirm_nooverwrite      boolean true
d-i partman-md/confirm               boolean true
d-i partman-lvm/confirm              boolean true
d-i partman-lvm/confirm_nooverwrite  boolean true
# <<< END partman <<<

### Base system
d-i base-installer/install-recommends boolean true
# Pin the installed system to a serial console so `lab-vm.sh console` works.
d-i debian-installer/add-kernel-opts string console=ttyS0,115200n8

### Apt setup
d-i apt-setup/cdrom/set-first        boolean false
d-i apt-setup/services-select        multiselect security, updates
popularity-contest popularity-contest/participate boolean false

### Package selection
# TASKSEL LINE (fetch-preseeds.sh swaps this for the `minimal` variant).
tasksel tasksel/first                multiselect standard, ssh-server
d-i pkgsel/include                   string openssh-server sudo curl
d-i pkgsel/upgrade                   select none

### Bootloader — GRUB to vda only.
d-i grub-installer/only_debian       boolean true
d-i grub-installer/with_other_os     boolean false
d-i grub-installer/bootdev           string /dev/vda

### Finish — reboot automatically into the freshly-installed system.
d-i finish-install/reboot_in_progress note
