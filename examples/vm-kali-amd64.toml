# Kali Linux on x86_64 — upstream prebuilt QEMU image (q35 + OVMF).
# Build: lab-vm.sh create --config vm-kali-amd64.toml
# Start: lab-vm.sh start  kali0
#
# `suite = "kali-rolling"` tracks whatever release Kali currently
# publishes at /current/ (resolved at create-time by parsing
# https://cdimage.kali.org/current/SHA256SUMS).  The resolved release
# tag (e.g. 2026.1) is used for the on-disk cache filename, so old
# VMs keep their original backing image when a new Kali release ships.
# To pin a specific release, set suite = "2026.1" (or similar) instead.
#
# Upstream artifact:
#   https://cdimage.kali.org/kali-<release>/kali-linux-<release>-qemu-amd64.7z
# lab-vm.sh fetches, extracts (needs `7z`, `7za`, or `7zz` on the host),
# and caches the resulting qcow2 exactly like any other cloud image.
#
# NOTE: Kali's prebuilt QEMU images do NOT ship cloud-init, so first-boot
# config is manual.  After `lab-vm.sh start kali0`:
#   1. lab-vm.sh console kali0       # login kali/kali on the serial console
#   2. sudo systemctl enable --now ssh
#   3. mkdir -p ~/.ssh && paste your pubkey into ~/.ssh/authorized_keys
#   4. lab-vm.sh ssh kali0 -- uname -a
# After that the VM behaves like any other disk-image VM.
#
# Prereqs on the host:
#   - p7zip-full  (Debian/Ubuntu/Kali) or p7zip-plugins (Rocky/Fedora)
#   - qemu-system-x86_64 + OVMF  (standard disk-image backend deps)

[[vm]]
name     = "kali0"
backend  = "disk-image"
distro   = "kali"
suite    = "kali-rolling"
arch     = "x86_64"
memory   = "4G"
cpus     = 2
ssh_port = 0   # auto-allocate
