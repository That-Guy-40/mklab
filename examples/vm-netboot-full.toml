# QEMU direct boot for the full Debian netboot track (systemd PID 1).
#
# Uses QEMU -kernel/-initrd to load the full Debian initrd built from
# chroot-netboot-full.toml. Exports to kernel-full / initrd-full.gz so
# the minimal track (kernel / initrd.gz) remains intact alongside.
#
# The full initrd decompresses to ~1 GB in RAM; this VM is given 2 GB so
# the kernel has headroom to unpack and run systemd without OOM.
#
# Workflow:
# 1. Build the full chroot (needs root, ~5-10 min):
#    sudo phase1-chroot/lab-chroot.sh create --config examples/chroot-netboot-full.toml
#
# 2. Export kernel + initrd to -full paths (needs root):
#    sudo phase1-chroot/lab-chroot.sh export-initrd netboot-full \
#        --kernel ~/netboot/kernel-full \
#        --output ~/netboot/initrd-full.gz
#
# 3. Create and start the VM (no sudo needed):
#    phase2-qemu-vm/lab-vm.sh create --config examples/vm-netboot-full.toml
#    phase2-qemu-vm/lab-vm.sh start  netboot-full
#
# Expect on the serial console: systemd boot messages, then a login prompt.
# Default root password: none (press Enter). SSH is available if dhcpcd5
# obtained an address (check: ip addr show inside the VM).
#
# See examples/chroot-netboot-full.toml for the package list.
# See examples/vm-netboot-direct.toml for the minimal (busybox) equivalent.

[[vm]]
name    = "netboot-full"
backend = "kernel+initrd"
arch    = "x86_64"
# 4 GB: the locales-all package adds ~100 MB to the initrd; during boot the
# kernel holds both the compressed initrd (~480 MB) and the extracted rootfs
# (~1.5 GB) in RAM simultaneously.  2 GB is tight enough to OOM-panic.
memory  = "4G"
cpus    = 2
# Update /home/sqs to your $HOME if different (no shell expansion in TOML).
kernel  = "/home/sqs/netboot/kernel-full"
initrd  = "/home/sqs/netboot/initrd-full.gz"
append  = "console=ttyS0 root=/dev/ram0 rw systemd.unified_cgroup_hierarchy=0"
network = true
# cloud_init=true: lab-vm.sh generates a NoCloud seed ISO with your SSH pubkey
# and attaches it as a virtio block device.  cloud-init (installed in the chroot
# via chroot-netboot-full.toml) reads it on first boot and configures the lab user.
# The users[] and post_commands[] in the chroot TOML already set up credentials
# at build time, so SSH works even if cloud-init fails to find the datasource.
cloud_init = true
