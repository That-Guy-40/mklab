# Matt Might "survival guide for Unix beginners" box on Debian 13 (trixie).
#
# A throwaway system container with BASH + the standard complement of Unix tools
# (the navigation, text, man, grep/find, ssh utilities the guide walks through),
# a non-root `learner` user, and a small `~/unix-survival/` sandbox that mirrors
# the guide's running examples (README.txt, a Desktop/READINGLIST.txt, a
# `baz -> bar` symlink). Driven through phase5-lxd/lab-lxd.sh, which speaks LXD or
# Incus identically.
#
#   # 1) launch the container
#   phase5-lxd/lab-lxd.sh up   --config examples/UNIX_novice_survival_guide/unix-survival-debian.toml
#
#   # 2) provision it (install tools + a `learner` user + the sandbox)
#   examples/UNIX_novice_survival_guide/setup-workshop.sh unix-survival-debian/shell
#
#   # 3) start reading — log in as the learner and follow the guide
#   phase5-lxd/lab-lxd.sh exec unix-survival-debian/shell -- su - learner
#
#   # 4) tear down
#   phase5-lxd/lab-lxd.sh down --lab unix-survival-debian
#
# The by-hand walkthrough (what setup-workshop.sh automates, and why) is RUNBOOK.md.

[lab]
name        = "unix-survival-debian"
description = "Matt Might 'survival guide for Unix beginners' env (BASH + standard tools) on Debian 13 (trixie)"
tags        = ["unix-survival", "matt-might", "bash", "tutorial", "debian", "trixie"]

[[instance]]
name  = "shell"
type  = "container"
# Debian 13 / trixie container, from the linuxcontainers `images:` remote.
image = "images:debian/13"
