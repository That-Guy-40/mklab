# root-password-reset — Kali (kali-rolling): the reset TARGET is built by the
# sibling kali-preseed-gallery, NOT here.  (Dogfooding: this lab reuses the
# gallery's verified headless Kali install instead of shipping its own VM.)
#
# WHY THERE IS NO [[vm]] BLOCK.  Kali's prebuilt QEMU *desktop* image (this file's
# ORIGINAL disk-image spec) cannot be driven on lab-vm.sh's headless serial-only
# QEMU: its GRUB is built for gfxterm and faults with no video device (lab-vm.sh
# runs `-display none -nographic -nodefaults`) → an endless SeaBIOS→GRUB→reset
# boot loop (301 resets/80s), never reaching a menu, the kernel, or a login.  A
# d-i + preseed install instead lays down a normal grub-pc whose menu IS serial-
# reachable — so the reset target is a *preseed-installed* Kali from
# examples/kali-preseed-gallery/ (variant: headless-default), VM
# "kali-preseed-install".  This lab then owns only the PRE-STAGE + the RUNBOOK
# that drive the reset on it.  `lab-vm.sh create --config kali.toml` has nothing
# to build here on purpose — use the gallery's TOML in step 1 below.
#
# Full evidence (the 7z boot loop) + the verified reset run are in MANUAL_TESTING.md
# → "Kali (prebuilt image)" and "Kali method — verified end-to-end on a
# preseed-installed Kali".
#
# ── AUTOMATED (a .toml can't run a process; these driver scripts do, reusing the
#    gallery + tools/serial-drive.py — they run exactly the manual steps below) ──
#
#   examples/root-password-reset/setup-kali-target.sh   # build + pre-stage a ready
#                                                       # target, then HAND-WALK the reset
#   examples/root-password-reset/reset-demo.sh          # OR fully hands-off: setup +
#                                                       # serial-drive the reset + verify
#
# ── Build + reset a REAL Kali BY HAND (verified 2026-06-11, kernel 6.19.14+kali-amd64) ──
#
#   # 1. Build a headless Kali via the gallery (d-i + the headless-default preseed):
#   examples/kali-pxe-lab/fetch-kali-installer.sh --arch amd64
#   examples/kali-preseed-gallery/select-preseed.sh headless-default
#   phase4-podman/lab-podman.sh up     --config examples/kali-preseed-gallery/kali-preseed-gallery.toml
#   phase2-qemu-vm/lab-vm.sh    create --config examples/kali-preseed-gallery/kali-preseed-gallery.toml
#   phase2-qemu-vm/lab-vm.sh    start  kali-preseed-install     # unattended d-i; reboots into Kali
#
#   # 2. Pre-stage over the SERIAL console (login kali/kali) — lab setup, NOT the
#   #    reset.  The headless install has no ssh/curl and puts console=ttyS0 only on
#   #    the *installer*, so this differs from setup/prestage.sh (which is delivered
#   #    over ssh on the cloud-image distros): TYPE these append-only edits
#   #    (/etc/default/grub is sourced as shell, so a trailing reassignment wins):
#   echo 'GRUB_CMDLINE_LINUX="console=ttyS0,115200n8"' | sudo tee -a /etc/default/grub
#   echo 'GRUB_TIMEOUT_STYLE=menu'                     | sudo tee -a /etc/default/grub
#   echo 'root:S0meForgottenPass'                      | sudo chpasswd   # the pw to "forget"
#   sudo update-grub
#
#   # 3. Reset: follow RUNBOOK-init-shell.md (Kali variation) on kali-preseed-install
#   #    — ro→rw, quiet→init=/bin/bash, passwd root, exec /sbin/init.  Old password
#   #    "S0meForgottenPass" is rejected; the new one logs in (uid=0).
#
#   # 4. Teardown:
#   phase4-podman/lab-podman.sh down    --lab kali-preseed-gallery
#   phase2-qemu-vm/lab-vm.sh    destroy kali-preseed-install --force
#
# STATUS: the linuxconfig recipe is VERIFIED end-to-end on this preseed-installed
# Kali (2026-06-11).  Creds from the preseed: kali/kali (root locked until the
# pre-stage sets it).  Throwaway lab creds only — never on a real/networked host.
#
# (Intentionally no [[vm]] / [[service]] tables — this file is a pointer + the
#  Kali pre-stage/reset workflow; the VM comes from the gallery.)
