# root-password-reset — Debian, UEFI (OVMF/edk2) boot.
#
#   Part of examples/root-password-reset/ — see README.md.
#   The UEFI half of the firmware PAIR (debian-bios.toml is the BIOS half).  The
#   point of the pair: the reset technique is FIRMWARE-AGNOSTIC — once you reach
#   the GRUB editor, `e` → edit the `linux` line → Ctrl-X is identical.  Only
#   *reaching* the menu differs: SeaBIOS hands straight to GRUB, whereas OVMF
#   shows its own firmware/boot-manager phase first.  (On a real UEFI box GRUB is
#   `grubx64.efi`; Arch/EFI installs often use systemd-boot instead — press `e`
#   there too.)
#
#   phase2-qemu-vm/lab-vm.sh create --config examples/root-password-reset/debian-uefi.toml
#   phase2-qemu-vm/lab-vm.sh start  rpr-debian-uefi
#   phase2-qemu-vm/lab-vm.sh ssh rpr-debian-uefi -- 'sudo bash -s' < examples/root-password-reset/setup/prestage.sh
#   # then RUNBOOK-init-shell.md (reboot → interrupt GRUB → init=/bin/bash → passwd).
#
# STATUS: ✅ VERIFIED end-to-end on this host (KVM, 2026-07-23).  OVMF surfaces the
# GRUB menu on the serial console (after its own BdsDxe boot-manager phase); the
# full init=/bin/bash reset then runs identically to the BIOS twin — old password
# rejected, new password uid=0(root).  Evidence (BdsDxe / EDK II banner, GRUB over
# serial, the reset): MANUAL_TESTING.md → "Debian UEFI/OVMF — verified end-to-end".

[[vm]]
name     = "rpr-debian-uefi"
backend  = "disk-image"
distro   = "debian"
suite    = "bookworm"
arch     = "x86_64"
firmware = "uefi"          # OVMF/edk2 (lab-vm.sh default). The BIOS twin is debian-bios.toml.
memory   = "2G"
cpus     = 2
ssh_port = 0               # auto-allocate from 2222
