# Mixed topology: 2 containers + 1 VM in a single lab.  Exercises the
# [[instance]] array-of-tables schema plus the container/vm discriminator.
#
# Try it:
#   phase5-lxd/lab-lxd.sh up     --config examples/lxd-examples/lxd-mixed-topology.toml
#   phase5-lxd/lab-lxd.sh list   --lab demo-mixed
#   phase5-lxd/lab-lxd.sh status --lab demo-mixed
#   phase5-lxd/lab-lxd.sh export demo-mixed --format lxc-yaml | head -40
#   phase5-lxd/lab-lxd.sh down   --lab demo-mixed

[lab]
name        = "demo-mixed"
description = "Two Alpine containers + one Alpine VM, all in one lab"
tags        = ["lxd", "mixed", "container", "vm"]

[[instance]]
name  = "web"
type  = "container"
image = "images:alpine/latest"
config = { "limits.memory" = "256MiB" }

[[instance]]
name  = "cache"
type  = "container"
image = "images:alpine/latest"
config = { "limits.memory" = "128MiB" }

[[instance]]
name  = "worker-vm"
type  = "vm"
image = "images:alpine/latest"
# security.secureboot=false: see lxd-vm-single.toml for the rationale.
config = { "limits.memory" = "512MiB", "limits.cpu" = "1", "security.secureboot" = "false" }
