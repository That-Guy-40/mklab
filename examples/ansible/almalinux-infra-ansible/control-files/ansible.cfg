# Lab ansible.cfg — used inside the control container (cwd /lab).
# Mirrors infra-ansible's own ansible.cfg (root user, pipelining) but points
# roles_path at the staged upstream roles and turns off host-key checking for
# the throwaway lab containers.
[defaults]
inventory          = /lab/inventory.ini
roles_path         = /lab/infra-ansible/roles
host_key_checking  = False
retry_files_enabled = False
remote_user        = root

[ssh_connection]
pipelining = True
