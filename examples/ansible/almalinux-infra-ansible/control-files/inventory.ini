# Lab inventory — run-recipe.sh replaces __TARGET_IP__ with the live target
# container's IP (read from `incus list`) each run, so this file is regenerated
# host-side and read by the control container over the /lab mount.
[lab]
target ansible_host=__TARGET_IP__

[lab:vars]
ansible_user=root
ansible_ssh_private_key_file=/lab/ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
