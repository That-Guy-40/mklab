# Unified cross-phase netboot lab — one TOML drives Phase 1 (chroot),
# Phase 4 (rootless nginx), and Phase 2 (iPXE QEMU VM).
#
# Each phase tool reads only the blocks it owns and silently ignores the rest:
#   lab-chroot.sh  reads [[chroot]]
#   lab-podman.sh  reads [[service]] where engine="podman"
#   lab-vm.sh      reads [[vm]]
#
# Phase 6's TUI will show all three resources together under the "netboot" lab.
#
# Full workflow (run in order):
# 1. Set up the artifact directory (once):
#    sudo netboot/setup-netboot-dir.sh
#
# 2. Build the chroot rootfs (Phase 1, needs root, ~1-2 min):
#    sudo lab-chroot.sh create --config examples/netboot-lab.toml
#
# 3. Export kernel + initrd from the chroot (Phase 1, needs root):
#    sudo lab-chroot.sh export-initrd netboot-minimal \
#        --kernel /srv/netboot/kernel --output /srv/netboot/initrd.gz
#
# 4. Build the iPXE disk image:
#    netboot/build-ipxe.sh --server http://10.0.2.2:8080 \
#                          --output-dir /srv/netboot
#
# 5. Bring up the nginx server (Phase 4) and the iPXE VM (Phase 2):
#    lab-podman.sh up     --config examples/netboot-lab.toml
#    sudo lab-vm.sh create --config examples/netboot-lab.toml
#    lab-vm.sh start netboot-ipxe
#
# Tear down:
#    lab-vm.sh stop    netboot-ipxe
#    lab-podman.sh down --lab netboot
#    sudo lab-chroot.sh destroy netboot-minimal --force

[lab]
name        = "netboot"
description = "HTTP netboot pipeline: debootstrap initrd → rootless nginx → QEMU iPXE simulation"
tags        = ["netboot", "ipxe", "http", "initrd"]

# ─── Phase 1: build the initrd rootfs ────────────────────────────────────────
[[chroot]]
name        = "netboot-minimal"
backend     = "debootstrap"
distro      = "debian"
suite       = "bookworm"
arch        = "x86_64"
target      = "/var/chroots/netboot-minimal"
variant     = "minbase"
init_script = "busybox"
include     = ["linux-image-amd64", "busybox-static", "kmod"]
manager     = "none"

# ─── Phase 4: rootless nginx serving the artifacts ───────────────────────────
[[service]]
name    = "http"
engine  = "podman"
image   = "docker.io/library/nginx:alpine"
ports   = ["8080:80"]
volumes = [
    "/srv/netboot:/usr/share/nginx/html:ro",
    "/etc/lab-netboot/ipxe-mime.conf:/etc/nginx/conf.d/ipxe-mime.conf:ro",
]

# ─── Phase 2: QEMU boots from the iPXE disk image ────────────────────────────
[[vm]]
name       = "netboot-ipxe"
backend    = "disk-image"
image      = "/srv/netboot/ipxe.qcow2"
arch       = "x86_64"
memory     = "512M"
cpus       = 1
network    = true
cloud_init = false
