# micro-linux — s390x from-source distro (cross-compiled kernel + BusyBox).
#
# Boots the artifacts produced by mlbuild.sh on QEMU's `s390-ccw-virtio`
# machine (IBM mainframe emulation).  On an x86_64 host this runs under TCG
# emulation.
#
# Build first (requires the toolchain image with WITH_EXTRA_ARCHES=1):
#   micro-linux/mlbuild.sh all --arch s390x
# Then:
#   phase2-qemu-vm/lab-vm.sh create --config examples/micro-linux-s390x.toml
#   phase2-qemu-vm/lab-vm.sh start  micro-linux-s390x
#   phase2-qemu-vm/lab-vm.sh console micro-linux-s390x   # Ctrl-] to detach
#
# Notes:
#   kernel  — s390x produces arch/s390/boot/bzImage; mlbuild.sh copies it
#             as out/s390x/kernel.
#   append  — console=ttyS0: the SCLP VT220 console (CONFIG_SCLP_VT220_CONSOLE)
#             appears as /dev/ttyS0 inside the guest.  /etc/securetty lists ttyS0.
#   memory  — 512M: CCW firmware initialisation needs more room than microvm.
#   firmware — s390-ccw bios is bundled inside qemu-system-s390x; no separate
#             firmware package needed.

[[vm]]
name    = "micro-linux-s390x"
backend = "kernel+initrd"
arch    = "s390x"
memory  = "512M"
cpus    = 1
# EDIT these to your checkout if it is not at this path:
kernel  = "/media/sqs/COLD_STORAGE/LAB_CREATE_V2/micro-linux/out/s390x/kernel"
initrd  = "/media/sqs/COLD_STORAGE/LAB_CREATE_V2/micro-linux/out/s390x/initramfs.cpio.gz"
append  = "console=ttyS0"
network = false
