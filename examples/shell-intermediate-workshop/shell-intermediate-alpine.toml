# "Bash by example" (Daniel Robbins) intermediate workshop — Alpine Linux.
#
# The same scripting playground as shell-intermediate-debian.toml on a
# musl/BusyBox base. The articles assume BASH + GNU tools; Alpine ships ash +
# BusyBox, so setup-workshop.sh installs bash + the GNU tools (a documented
# divergence — see RUNBOOK.md / MANUAL_TESTING.md). Engine-agnostic via
# phase5-lxd/lab-lxd.sh (LXD or Incus).
#
#   # 1) launch the container
#   phase5-lxd/lab-lxd.sh up   --config examples/shell-intermediate-workshop/shell-intermediate-alpine.toml
#
#   # 2) provision it (install bash + GNU tools + a `learner` user + playground)
#   examples/shell-intermediate-workshop/setup-workshop.sh shell-intermediate-alpine/shell
#
#   # 3) start the workshop — log in as the learner and follow the PDFs
#   phase5-lxd/lab-lxd.sh exec shell-intermediate-alpine/shell -- su - learner
#
#   # 4) tear down
#   phase5-lxd/lab-lxd.sh down --lab shell-intermediate-alpine

[lab]
name        = "shell-intermediate-alpine"
description = "Bash by example (Robbins) intermediate bash-programming env (bash + GNU tools) on Alpine"
tags        = ["bash-by-example", "robbins", "bash", "scripting", "workshop", "alpine", "musl"]

[[instance]]
name  = "shell"
type  = "container"
# `images:alpine/latest` is rewritten by lab-lxd.sh to the highest stable
# alpine/X.Y on the `images:` remote.
image = "images:alpine/latest"
