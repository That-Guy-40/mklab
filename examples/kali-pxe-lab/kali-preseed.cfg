# Kali Linux zero-touch install — Debian-installer (d-i) preseed.
# Throwaway-lab posture, served at http://<server>/kali/kali-preseed.cfg.
#
# Kali is Debian-based, so its network install is driven by the DEBIAN
# INSTALLER and a *preseed* file — NOT Anaconda/kickstart like the Rocky and
# AlmaLinux labs.  This file is the d-i equivalent of those labs' .ks files.
#
# It is fetched by d-i because the iPXE kernel cmdline carries:
#   auto=true priority=critical preseed/url=http://<server>/kali/kali-preseed.cfg
# `auto=true priority=critical` suppresses every interactive prompt that this
# file answers, giving a fully unattended install.
#
# ─── Security posture ────────────────────────────────────────────────────────
#   WARNING: plaintext lab credentials (root: lab, user kali: kali).
#   NEVER expose this VM or the server that serves this preseed to an untrusted
#   network — anyone who can fetch it learns the passwords.
#   For real use: switch the clear-text password lines to the hashed form
#     d-i passwd/root-password-crypted password [crypt(3) SHA-512 hash]
#     d-i passwd/user-password-crypted password [crypt(3) SHA-512 hash]
#   (generate with: mkpasswd -m sha-512  ── from the 'whois' package),
#   restrict nginx to loopback or a private VLAN, and rotate after first boot.
#
# ─── Disk layout rationale (the two-disk boot-loop) ──────────────────────────
# The QEMU target VM uses the same boot-loop as the Rocky/Alma labs:
#   disk0 (vda) = blank 20 GB qcow2,   bootindex=0  ← d-i installs here
#   disk1 (vdb) = ipxe.qcow2 ROM disk, bootindex=1  ← fallback iPXE chainloader
# First boot: vda has no boot sector → firmware falls through to vdb (iPXE) →
# d-i installs to vda → reboot → vda is now bootable and wins → iPXE never runs
# again.  partman is pinned to vda below so it never touches the iPXE ROM (vdb).
# ─────────────────────────────────────────────────────────────────────────────

### Localization
d-i debian-installer/locale          string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network
# The installer NIC comes up via DHCP (QEMU slirp serves it).  Pick the first
# wired link automatically and don't prompt.
d-i netcfg/choose_interface          select auto
d-i netcfg/get_hostname              string kali-pxe
d-i netcfg/get_domain                string lab
d-i netcfg/hostname                  string kali-pxe
# Don't stall waiting for a slow link-detect, and don't prompt on no-DHCP.
d-i netcfg/dhcp_timeout              string 60
d-i netcfg/link_wait_timeout         string 30

### Mirror — Kali rolling over the upstream HTTPS-fronted mirror.
# The Kali archive signing key ships inside the d-i initrd, so apt trusts
# kali-rolling out of the box (no manual keyring step, unlike a host debootstrap).
d-i mirror/country                   string manual
d-i mirror/http/hostname             string http.kali.org
d-i mirror/http/directory            string /kali
d-i mirror/http/proxy                string
d-i mirror/suite                     string kali-rolling
d-i mirror/codename                  string kali-rolling

### Clock & time zone
d-i clock-setup/utc                  boolean true
d-i time/zone                        string Etc/UTC
d-i clock-setup/ntp                  boolean true

### Accounts — throwaway lab credentials (consistent with the rest of mklab).
# Root login enabled with password 'lab'; a sudo-capable user 'kali' / 'kali'.
d-i passwd/root-login                boolean true
d-i passwd/root-password             password lab
d-i passwd/root-password-again       password lab
d-i passwd/user-fullname             string Kali Lab User
d-i passwd/username                  string kali
d-i passwd/user-password             password kali
d-i passwd/user-password-again       password kali
# Put 'kali' in sudo (and the usual desktop groups) so `sudo` works immediately.
d-i passwd/user-default-groups       string audio cdrom dip plugdev netdev sudo

### Partitioning — confine EVERYTHING to vda.  vdb is the iPXE ROM (do not touch).
d-i partman-auto/disk                string /dev/vda
d-i partman-auto/method              string regular
d-i partman-auto/choose_recipe       select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition         select finish
d-i partman/confirm                  boolean true
d-i partman/confirm_nooverwrite      boolean true
# Don't offer to install to other disks (vdb) or prompt about them.
d-i partman-md/confirm               boolean true
d-i partman-lvm/confirm              boolean true
d-i partman-lvm/confirm_nooverwrite  boolean true

### Base system
d-i base-installer/install-recommends boolean true
# Pin the installed system to a serial console so `lab-vm.sh console` works
# after the boot-loop hands off to the installed kernel.
d-i debian-installer/add-kernel-opts string console=ttyS0,115200n8

### Apt setup
d-i apt-setup/use_mirror             boolean true
d-i apt-setup/services-select        multiselect
d-i apt-setup/contrib                boolean true
d-i apt-setup/non-free               boolean true
popularity-contest popularity-contest/participate boolean false

### Package selection
# LEAN by default so the lab finishes fast (~standard system + SSH).  To get a
# real Kali toolset instead, replace the pkgsel/include line with one of:
#     kali-linux-headless    (CLI tools, no GUI — large)
#     kali-linux-default      (the classic Kali toolset + XFCE desktop — very large)
# Those pull GBs of packages and take much longer than this minimal install.
tasksel tasksel/first                multiselect standard
d-i pkgsel/include                   string openssh-server sudo curl
d-i pkgsel/upgrade                   select none
d-i pkgsel/update-policy             select none

### Bootloader — GRUB to vda only (never vdb, the iPXE ROM).
d-i grub-installer/only_debian       boolean true
d-i grub-installer/with_other_os     boolean false
d-i grub-installer/bootdev           string /dev/vda

### Finish — reboot automatically into the freshly-installed system.
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/reboot     boolean true
