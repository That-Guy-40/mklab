# Unified Kali Linux zero-touch PXE lab — one TOML feeds Phase 4 and Phase 2.
#
# Each phase tool reads only the blocks it owns and silently ignores the rest:
#   phase4-podman/lab-podman.sh   reads [[service]] with engine="podman"
#   phase2-qemu-vm/lab-vm.sh      reads [[vm]]
#
# Kali is the DEBIAN-INSTALLER (d-i + preseed) cousin of the Rocky/AlmaLinux
# Anaconda+kickstart labs.  Same iPXE + nginx + QEMU boot-loop machinery; the
# only differences are the installer family (d-i, driven by a preseed) and the
# Kali mirror.  Reference: https://www.kali.org/docs/installation/network-pxe/
#
# ─── Workflow — run these in order against this file ─────────────────────────
#
#   # 1. Fetch + verify the Kali d-i kernel + initrd into ~/netboot/kali/:
#   examples/kali-pxe-lab/fetch-kali-installer.sh --arch amd64
#
#   # 2. Stage the preseed into the served directory:
#   cp examples/kali-pxe-lab/kali-preseed.cfg ~/netboot/kali/
#
#   # 3. Build iPXE with the d-i boot params (preseed URL + serial console):
#   netboot/build-ipxe.sh --server http://10.0.2.2:8181 \
#       --kernel-path /kali/linux --initrd-path /kali/initrd.gz \
#       --append 'auto=true priority=critical preseed/url=http://10.0.2.2:8181/kali/kali-preseed.cfg DEBIAN_FRONTEND=text console=ttyS0,115200n8 ---'
#       # The trailing `---` hands the post-`---` args to the INSTALLED kernel.
#       # d-i fetches the preseed early; `auto=true priority=critical` makes it
#       # fully unattended.  (No {MAC} token needed — one preseed for the lab.)
#
#   # 4. Bring up the rootless nginx artifact server (Phase 4):
#   phase4-podman/lab-podman.sh up --config examples/kali-pxe-lab/kali-pxe-lab.toml
#
#   # 5. Create and start the installer VM (Phase 2) — unattended:
#   phase2-qemu-vm/lab-vm.sh create --config examples/kali-pxe-lab/kali-pxe-lab.toml
#   phase2-qemu-vm/lab-vm.sh start  kali-pxe-install   # walk away; comes back installed
#   phase2-qemu-vm/lab-vm.sh ssh    kali-pxe-install   # login: kali / kali  (or root / lab)
#
# Tear down:
#   phase4-podman/lab-podman.sh down    --lab kali-pxe
#   phase2-qemu-vm/lab-vm.sh    destroy kali-pxe-install --force
#
# Real hardware (faithful to the Kali network-PXE docs): use dnsmasq DHCP+TFTP
# serving pxelinux from the netboot.tar.gz — see examples/kali-pxe-lab/README.md
# §"Path B".
#
# Update /home/sqs to your $HOME if different (no shell expansion in TOML).

[lab]
name        = "kali-pxe"
description = "Zero-touch Kali Linux PXE install: rootless nginx serves the Debian-installer kernel/initrd + preseed (Phase 4); QEMU target VM installs via iPXE -> d-i -> preseed and reboots into Kali (Phase 2)."
tags        = ["kali", "kali-linux", "debian-installer", "pxe", "netboot", "zero-touch"]

# ─── Phase 4: rootless nginx serving netboot artifacts ─────────────────────
# Serves ~/netboot/ on host port 8181; the Kali bits live under ~/netboot/kali/
# (so they never collide with the Rocky/Alma vmlinuz/initrd.img in ~/netboot/).
# lab-podman.sh auto-appends :Z to the volume when SELinux is enforcing.
[[service]]
name    = "http"
engine  = "podman"
image   = "docker.io/library/nginx:alpine"
ports   = ["8181:80"]
volumes = ["/home/sqs/netboot:/usr/share/nginx/html:ro"]

# ─── Phase 2: QEMU installer VM (pxe-install: NIC PXE boots ipxe.pxe) ───────
# SeaBIOS tries the blank target disk (bootindex=0) → fails when empty → falls to
# the NIC's stock PXE ROM ("Booting from ROM") → TFTP-chainloads ipxe.pxe → iPXE
# fetches the d-i kernel/initrd over HTTP → installs to /dev/vda → reboots.
# Post-install the disk (bootindex=0) boots Kali; the NIC ROM is never reached
# again → the loop terminates.  Verified end-to-end on KVM.
#
#   UEFI variant: drop `firmware` and set pxe_bootfile = "ipxe.efi" (OVMF
#   PXE-boots the EFI iPXE — also verified).  build-ipxe builds both.
#
# (The older two-disk iPXE-ROM-on-a-disk trick does NOT boot in QEMU: SeaBIOS
# only attempts the first hard disk, and x86_64 disk-image VMs default to OVMF,
# which can't boot a BIOS-MBR disk — see step 3 above for the bootfile.)
# cloud_init=false: d-i provisions root + the kali user from the preseed.
# memory: 1.5 GB is comfortable for d-i (unpacks the initrd + runs apt).
[[vm]]
name           = "kali-pxe-install"
backend        = "pxe-install"          # NIC PXE-boots ipxe.pxe; no iPXE ROM disk
firmware       = "bios"                  # SeaBIOS + NIC option-ROM path (UEFI: drop this + use ipxe.efi)
install_target = "20G"                   # blank disk, bootindex=0: install dest + post-install boot disk
mac            = "52:54:00:ca:11:01"     # valid hex; "ca11" ~ kali
arch           = "x86_64"
memory         = "1536M"
cpus           = 2
cloud_init     = false                   # d-i provisions directly; no datasource
pxe_dir        = "/home/sqs/netboot"     # QEMU slirp TFTP root (serves ipxe.pxe)
pxe_bootfile   = "ipxe.pxe"              # BIOS iPXE NBP (UEFI: ipxe.efi)
