# nginx-ks-fallback.conf — include this in your netboot nginx server{} block to
# serve ks/default.ks for any machine whose MAC isn't in ks/.
#
# SAFETY NOTE: enabling this means *any* machine that PXE-boots and doesn't have
# a per-MAC kickstart will receive the default.ks and begin installing AlmaLinux.
# Only enable this on an isolated lab network or when you have strict DHCP control.
#
# Usage:
#   1. Generate default.ks:
#      netboot/gen-almalinux-ks.sh --mac 52:54:00:AB:CD:EF --default
#   2. Add this file to your nginx server block:
#      include /home/<you>/.config/lab-netboot/nginx-ks-fallback.conf;
#
# The iPXE boot script requests  /ks/${mac:hexhyp}.ks  at runtime.
# try_files checks that path first; if it doesn't exist it serves default.ks.
# A 404 is returned only if default.ks is also missing (the safe default).

location /ks/ {
    root /usr/share/nginx/html;   # adjust to match your nginx root if different
    try_files $uri /ks/default.ks =404;
}
