# Build an image for a non-host architecture using qemu-user-static.
#
# This spec is used with `lab-podman.sh build`, not `up` — multi-arch
# build is an image-production step, then you can reference the resulting
# image from a separate `[[service]]` spec.
#
# The ./context directory must contain a Containerfile or Dockerfile.
#
# CLI equivalent (no TOML needed):
#   lab-podman.sh build --tag myapp:arm64 --context ./context --arch aarch64
#
# This TOML is reference-only; `build` currently takes CLI flags.  Future
# versions may accept this shape via --config.
#
# Prereqs (Debian/Ubuntu/Kali):
#   sudo apt-get install -y qemu-user-static binfmt-support
#   sudo update-binfmts --enable
# Verify: ls /proc/sys/fs/binfmt_misc/qemu-aarch64  → must exist

[lab]
name        = "multiarch-demo"
description = "Build image for foreign arch (aarch64 on x86_64 host)"

[[build]]
tag     = "myapp:aarch64"
context = "./context"
arch    = "aarch64"
