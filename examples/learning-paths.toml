[[path]]
id         = "os-image-factories"
title      = "OS image factories: bake a bootable image with debos"
difficulty = "🟡"
est        = "⏱ ~1–2h"
prereqs    = ["chroot-to-system"]
audience   = "you've turned a rootfs into a bootable VM by hand — now do it declaratively"
goal       = "Assemble a whole bootable OS image from a declarative recipe with debos (the Debian image builder), then meet the distro wrapper — Kali's kali-vm — built on the very same engine. Learn the tool, then the thing built on it."
  [[path.step]]
  lab        = "debian-vm-builder/"
  learn      = "debos directly: a YAML recipe (debootstrap → apt → image-partition → filesystem-deploy → systemd-boot) assembled inside a fakemachine KVM build VM — no installer, no by-hand loop-mounting."
  checkpoint = "`build-debian-vm.sh` bakes a trixie qcow2; `run-graphical.sh` boots it under OVMF to a `debian-vm login:` (SSH `debian`/`debian`)."
  [[path.step]]
  lab        = "kali-vm-builder/"
  tags       = ["🔒"]
  learn      = "Kali's official `kali-vm` is a thin wrapper around the SAME debos engine, producing the image you'd otherwise download — now the wrapper reads clearly, because you saw the machinery underneath."
  checkpoint = "`build-kali-vm.sh --headless` builds a QCOW2; `run-graphical.sh` boots it to a Kali login."


