# Matt Might "Sculpting text with regex, grep, sed, awk" box on Alpine Linux.
#
# The same environment as sculpting-text-debian.toml on a musl/BusyBox base. The
# article is written for GNU grep/sed/gawk (egrep backreferences, GNU sed
# extensions, gawk functions/arrays); Alpine ships BusyBox applets that diverge,
# so setup-workshop.sh installs the GNU tools to follow it faithfully (a
# documented divergence — see RUNBOOK.md / MANUAL_TESTING.md). Engine-agnostic:
# phase5-lxd/lab-lxd.sh speaks LXD or Incus identically.
#
#   # 1) launch the container
#   phase5-lxd/lab-lxd.sh up   --config examples/UNIX-sculpting-text-regex-grep-sed-awk/sculpting-text-alpine.toml
#
#   # 2) provision it (install GNU grep/sed/gawk + dict + a `learner` user + the sandbox)
#   examples/UNIX-sculpting-text-regex-grep-sed-awk/setup-workshop.sh sculpting-text-alpine/shell
#
#   # 3) start sculpting — log in as the learner and follow the guide
#   phase5-lxd/lab-lxd.sh exec sculpting-text-alpine/shell -- su - learner
#
#   # 4) tear down
#   phase5-lxd/lab-lxd.sh down --lab sculpting-text-alpine

[lab]
name        = "sculpting-text-alpine"
description = "Matt Might 'Sculpting text' regex/grep/sed/awk env (GNU tools over BusyBox) on Alpine"
tags        = ["sculpting-text", "matt-might", "grep", "sed", "awk", "regex", "alpine", "musl"]

[[instance]]
name  = "shell"
type  = "container"
# `images:alpine/latest` is rewritten by lab-lxd.sh to the highest stable
# alpine/X.Y on the `images:` remote.
image = "images:alpine/latest"
