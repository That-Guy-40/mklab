# Zero-touch AlmaLinux installer target (BIOS, pxe-install).
#
# Boot-loop design:
#   SeaBIOS tries the blank install target (bootindex=0) → fails when empty →
#   falls to the NIC's stock PXE ROM → TFTP-chainloads ipxe.pxe → iPXE fetches
#   Anaconda + the per-MAC kickstart over HTTP → installs to /dev/vda → reboots.
#   On the next boot the disk (bootindex=0) is bootable and wins; the NIC ROM is
#   never reached again → the loop terminates.
#
#   For UEFI, use vm-almalinux-uefi-pxe.toml (backend=pxe-install + ipxe.efi).
#   (The older two-disk iPXE-ROM-on-a-disk trick does NOT boot in QEMU: SeaBIOS
#   tries only the first hard disk, and disk-image x86_64 defaults to OVMF which
#   can't boot a BIOS-MBR disk.)
#
# Result: create + start, walk away, come back to a running AlmaLinux system.
#
# Prereqs (run in order):
#   1. netboot/fetch-almalinux-installer.sh \
#          --mirror https://repo.almalinux.org/almalinux --release 9 --arch x86_64
#   2. netboot/gen-almalinux-ks.sh --mac 52:54:00:a1:9a:01
#          # -> ~/netboot/ks/52-54-00-a1-9a-01.ks
#   3. netboot/build-ipxe.sh --server http://10.0.2.2:8181 \
#          --kernel-path /vmlinuz --initrd-path /initrd.img \
#          --append 'inst.stage2=http://10.0.2.2:8181/ inst.repo=https://repo.almalinux.org/almalinux/9/BaseOS/x86_64/os/ inst.ks=http://10.0.2.2:8181/ks/{MAC}.ks inst.text console=ttyS0 ip=dhcp'
#          # {MAC} is a literal token replaced at build time; iPXE expands it to
#          # the NIC's MAC at runtime (e.g. 52-54-00-a1-9a-01).
#   4. phase4-podman/lab-podman.sh up --config examples/podman-netboot-server.toml
#
# Then:
#   phase2-qemu-vm/lab-vm.sh create --config examples/vm-almalinux-pxe-install.toml
#   phase2-qemu-vm/lab-vm.sh start  almalinux-pxe-install   # walk away; comes back installed
#   phase2-qemu-vm/lab-vm.sh ssh    almalinux-pxe-install   # login: lab / lab
#
# Note: cloud_init = false because the iPXE ROM has no cloud-init datasource;
# Anaconda provisions root and the lab user directly from the kickstart.
#
# Update /home/sqs to your $HOME if different (no shell expansion in TOML).

[[vm]]
name           = "almalinux-pxe-install"
backend        = "pxe-install"          # NIC PXE-boots ipxe.pxe; no iPXE ROM disk
firmware       = "bios"                  # SeaBIOS + NIC option-ROM path (UEFI: vm-almalinux-uefi-pxe.toml)
install_target = "20G"                   # blank disk, bootindex=0: install dest + post-install boot disk
mac            = "52:54:00:a1:9a:01"     # pinned so the per-MAC kickstart matches
arch           = "x86_64"
memory         = "4096M"               # 4G: Anaconda + the HTTP stage2 (install.img ~1.2 GB) loads into the initramfs tmpfs
cpus           = 2
cloud_init     = false                   # Anaconda provisions directly; no datasource
pxe_dir        = "/home/sqs/netboot"     # QEMU slirp TFTP root (serves ipxe.pxe)
pxe_bootfile   = "ipxe.pxe"              # BIOS iPXE NBP
