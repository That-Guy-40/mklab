// /etc/apt/apt.conf.d/01acng — route this node's apt traffic through the lab's
// apt-cacher-ng caching proxy on `mirror` (10.128.1.6:3142).
//
// The first node to `apt-get install foo` pulls foo from the internet *once*
// (via mirror, which caches it); every other node then gets it from mirror's
// cache with no upstream fetch. Warm the cache once, and the rest of the lab
// installs air-gapped. Resolving `mirror.tiny.lab` needs the lab DNS in place
// first (config/common/resolv.conf.tiny), which is why the driver repoints DNS
// before dropping this file.
Acquire::http::Proxy "http://mirror.tiny.lab:3142";
// HTTPS repos can't be transparently cached (TLS is end-to-end); tunnel them
// straight through so `apt` still works for https:// sources.
Acquire::https::Proxy "DIRECT";
