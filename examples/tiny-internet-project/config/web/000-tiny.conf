# /etc/apache2/sites-available/000-tiny.conf — the tiny.lab virtual host.
# Enabled with `a2ensite 000-tiny` (and the stock 000-default disabled) so
# web01 answers for web01.tiny.lab / www.tiny.lab / tiny.lab off /var/www/tiny.
<VirtualHost *:80>
        ServerName web01.tiny.lab
        ServerAlias www.tiny.lab tiny.lab
        DocumentRoot /var/www/tiny

        <Directory /var/www/tiny>
                Options -Indexes +FollowSymLinks
                AllowOverride All
                Require all granted
        </Directory>

        # phpMyAdmin ships its own /etc/apache2/conf-available/phpmyadmin.conf
        # (enabled by the package), which aliases /phpmyadmin — so it's reachable
        # at http://web01.tiny.lab/phpmyadmin/ without anything extra here.

        ErrorLog  ${APACHE_LOG_DIR}/tiny-error.log
        CustomLog ${APACHE_LOG_DIR}/tiny-access.log combined
</VirtualHost>
