# /etc/dovecot/conf.d/99-tiny.conf — lab overrides for Dovecot IMAP/POP3.
# Loaded last, so these win over the stock conf.d snippets.
#
# ⚠️ Dovecot 2.4 (Debian 13) RENAMED several settings that every pre-2024
# tutorial — Tonello's included — still writes the old way. The 2.4 spellings:
#   mail_location = maildir:~/Maildir   →   mail_driver = maildir
#                                           mail_path   = %{home}/Maildir
#   disable_plaintext_auth = no         →   auth_allow_cleartext = yes
# The old names are now HARD ERRORS ("Unknown setting: mail_location"), so a
# config copied verbatim from the tutorial won't even let dovecot start.
#
# Dovecot authenticates against the container's system users (PAM), so a mailbox
# is just a Linux account. We point it at the same Maildir Postfix delivers into
# (home_mailbox = Maildir/). Both dovecot-imapd and dovecot-pop3d are installed,
# so IMAP and POP3 are served without an explicit `protocols` line.

# Read the Maildir Postfix writes (2.4 split of the old mail_location).
mail_driver = maildir
mail_path = %{home}/Maildir

# ⚠️ Debian's Dovecot 2.4 ships `mail_inbox_path = /var/mail/%{user}`, which
# pins INBOX to the old mbox spool even when the driver is maildir — so INBOX
# ends up at /var/mail/alice (root-owned, unwritable by the user) and every
# SELECT/STATUS fails with "Failed to autocreate mailbox: Permission denied".
# Point it at the SAME maildir root as mail_path so INBOX *is* ~/Maildir
# (new/cur/tmp at the root) — exactly where Postfix's `home_mailbox = Maildir/`
# delivers. (Leaving it empty instead makes Dovecot invent a `.INBOX` subfolder
# that Postfix never writes to, so mail silently never appears.)
mail_inbox_path = %{home}/Maildir

# Lab-only: permit LOGIN/PLAIN over unencrypted connections (2.4 name).
auth_allow_cleartext = yes
auth_mechanisms = plain login

# No TLS in the lab (no cert). Real deployments set ssl=required + a cert.
ssl = no
