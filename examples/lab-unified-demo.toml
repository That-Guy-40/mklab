# Unified cross-phase lab — one TOML feeds all four phase tools.
#
# The top-level [lab] block is cross-phase grouping metadata.  Each phase
# tool reads only the blocks it owns ([[chroot]], [[vm]], [[service]]
# with matching engine) and silently ignores the rest.
#
# Workflow — run these in order, against the same file:
#
#   # 1) Build the chroot (needs sudo; 1-3 min for debootstrap):
#   sudo phase1-chroot/lab-chroot.sh    create --config examples/lab-unified-demo.toml
#
#   # 2) Export the chroot as a user-readable tarball for Phase 4
#   #    (one-time; also runs under sudo so it can read root-mode files):
#   sudo phase1-chroot/lab-chroot.sh    export-tarball demo-ctf-attacker-tools \
#                                                      --output /tmp/demo-ctf-attacker.tar.gz
#
#   # 3) Build the VM:
#   sudo phase2-qemu-vm/lab-vm.sh       create --config examples/lab-unified-demo.toml
#
#   # 4) Bring up docker and podman services (both read the same TOML):
#        phase3-docker/lab-docker.sh    up     --config examples/lab-unified-demo.toml
#        phase4-podman/lab-podman.sh    up     --config examples/lab-unified-demo.toml
#
# Then see everything tagged as lab="demo-ctf":
#
#   sudo phase1-chroot/lab-chroot.sh list --lab demo-ctf
#   sudo phase2-qemu-vm/lab-vm.sh    list --lab demo-ctf
#        phase3-docker/lab-docker.sh list --lab demo-ctf
#        phase4-podman/lab-podman.sh list --lab demo-ctf
#
# Tear down likewise (reverse order):
#
#        phase4-podman/lab-podman.sh  down    --lab demo-ctf
#        phase3-docker/lab-docker.sh  down    --lab demo-ctf
#   sudo phase2-qemu-vm/lab-vm.sh     destroy demo-ctf-victim --force
#   sudo phase1-chroot/lab-chroot.sh  destroy demo-ctf-attacker-tools --force
#   rm -f /tmp/demo-ctf-attacker.tar.gz
#
# Prerequisites:
#   - kali-archive-keyring on the host (see phase1-chroot/INSTALL-KALI-KEYRING.md)
#   - debootstrap, qemu, podman, docker, yq (or tomlq), jq
#   - rootless podman configured (subuid/subgid — see Phase 4 MANUAL_TESTING)
#
# Phase 6's topology view will correlate these via lab-create.lab=demo-ctf
# labels/manifest fields and paint them as a single pane of glass.

[lab]
name        = "demo-ctf"
description = "Cross-phase CTF target: Kali attacker chroot → imported as rootless podman image; Alpine victim microvm; docker edge proxy; podman scanner pod."
tags        = ["ctf", "demo", "cross-phase"]

# ─── Phase 1: Kali rolling chroot (debootstrap) for attacker tooling ───────
# Pulls ~150 MB of packages from http.kali.org on first create (1-3 min).
# Requires /usr/share/keyrings/kali-archive-keyring.gpg on the host.
# The resulting tree is exported to a tarball and reused by the Phase 4
# service below via `from_tarball` — see workflow step (2) in the header.
[[chroot]]
name    = "demo-ctf-attacker-tools"
backend = "debootstrap"
distro  = "kali"
suite   = "kali-rolling"
arch    = "x86_64"
target  = "/var/chroots/demo-ctf-attacker"
variant = "minbase"
manager = "none"

# ─── Phase 2: Alpine microvm as the victim ─────────────────────────────────
[[vm]]
name    = "demo-ctf-victim"
backend = "kernel+initrd"
distro  = "alpine"
suite   = "3.19"
arch    = "x86_64"
memory  = "256M"
cpus    = 1
microvm = true
network = true
ssh     = true
persist = "128M"

# ─── Phase 3: Docker-backed edge proxy ─────────────────────────────────────
[[service]]
name    = "edge-proxy"
engine  = "docker"
image   = "nginx:alpine"
ports   = ["18081:80"]

# ─── Phase 4: Podman-backed scanner in a pod ───────────────────────────────
[[pod]]
name = "scanner"

[[service]]
name    = "scanner-alpine"
engine  = "podman"
manager = "pod"
pod     = "scanner"
image   = "docker.io/library/alpine:latest"
command = "sleep 3600"

# ─── Phase 4: rootless Kali container imported from the Phase 1 chroot ─────
# This is the cross-phase bridge: the tarball produced by the Phase 1
# `export-tarball` step (see workflow comment above) is `podman import`ed
# into a rootless image, then run with keep-id userns so host-side file
# ownership stays sane.
#
# Why from_tarball instead of from_chroot?  Chroots built via `sudo
# lab-chroot create` contain mode-600 files (/etc/shadow, /root/*) that
# an unprivileged tar can't read.  `export-tarball` runs the tar as root,
# chowns the output to the invoking user, and hands Phase 4 a fully-
# readable single file — clean rootless path.
[[service]]
name         = "attacker-kali"
engine       = "podman"
manager      = "plain"
from_tarball = "/tmp/demo-ctf-attacker.tar.gz"
userns       = "keep-id"
command      = "sleep 3600"
