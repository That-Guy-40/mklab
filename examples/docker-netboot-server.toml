# Rootful Docker variant: nginx serving netboot artifacts (kernel + initrd.gz +
# kickstart files) over HTTP on port 8181.
#
# This is the rootful Docker variant. The rootless Podman variant is
# examples/podman-netboot-server.toml (preferred when only serving is needed).
#
# Workflow:
# 1. Build artifacts with Phase 1 (chroot + cpio export):
#    sudo lab-chroot.sh create --config examples/chroot-netboot-minimal.toml
#    sudo lab-chroot.sh export-initrd netboot-minimal \
#        --kernel ~/netboot/kernel --output ~/netboot/initrd.gz
#
# 2. Start this server:
#    lab-docker.sh up --config examples/docker-netboot-server.toml
#
# 3. Boot a VM with Phase 2 or real hardware via iPXE:
#    sudo phase2-qemu-vm/lab-vm.sh create --config examples/vm-netboot-direct.toml
#    sudo phase2-qemu-vm/lab-vm.sh start netboot-direct
#    (or point iPXE client at http://<host-ip>:8181/)
#
# Verify:
#    curl -I http://localhost:8181/kernel
#    curl -I http://localhost:8181/initrd.gz
#
# Note: /home/sqs is a literal path — TOML does not expand shell variables.
# Replace it with your actual home directory if different.
# For AlmaLinux installs the ks/ subdirectory holds kickstart files served
# from the same root: curl -I http://localhost:8181/ks/almalinux.ks

[lab]
name = "netboot-srv"

[[service]]
name    = "http"
engine  = "docker"
image   = "nginx:alpine"
ports   = ["8181:80"]
volumes = ["/home/sqs/netboot:/usr/share/nginx/html:ro"]
