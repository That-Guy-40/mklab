# less without less — `ddpager`, a less-style pager written in bash builtins
# + dd + tput — on Debian 13 (trixie).
#
# A throwaway system container with bash, GNU coreutils (the `dd` whose
# stderr report is the pager's binary-file detector), `tput`, python3 (the
# pty harness that types at the pager one byte every 40 ms, like a careful
# human), a non-root `learner` user, and a `~/less-without-less/` sandbox:
# the pager VERBATIM, the pty driver, and a runnable demo.sh with 28 checks —
# including the raw-mode illusion (Ctrl-C exits 130 DESPITE `stty raw`,
# because bash's `read -n1` swaps its own termios in during every read).
#
#   # 1) launch the container
#   phase5-lxd/lab-lxd.sh up   --config examples/UNIX-less-without-less/less-without-less-debian.toml
#
#   # 2) provision it (bash + coreutils + tput + python3 + `learner` + the sandbox)
#   examples/UNIX-less-without-less/setup-workshop.sh less-without-less-debian/shell
#
#   # 3) start paging — log in as the learner
#   phase5-lxd/lab-lxd.sh exec less-without-less-debian/shell -- su - learner
#
#   # 4) tear down
#   phase5-lxd/lab-lxd.sh down --lab less-without-less-debian
#
# The by-hand walkthrough (what setup-workshop.sh automates, and why) is RUNBOOK.md.

[lab]
name        = "less-without-less-debian"
description = "ddpager: a less-style pager in bash builtins + dd + tput, driven through a real pty, on Debian 13 (trixie)"
tags        = ["pager", "less", "bash", "dd", "tput", "pty", "raw-mode", "debian", "trixie"]

[[instance]]
name  = "shell"
type  = "container"
# Debian 13 / trixie container, from the linuxcontainers `images:` remote.
image = "images:debian/13"
